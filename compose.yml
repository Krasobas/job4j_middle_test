services:

  # ===== Infrastructure =====

  postgres:
    image: postgres:16-alpine
    container_name: cd_postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-students_db}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 5

  broker:
    image: apache/kafka:latest
    container_name: broker
    ports:
      - "9094:9094"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093,EXTERNAL://:9094
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://broker:9092,EXTERNAL://localhost:9094
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@broker:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
    volumes:
      - kafka-data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:9092 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  photo-storage:
    image: minio/minio
    container_name: photo-storage
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_AKEY:-minio-access-key}
      MINIO_ROOT_PASSWORD: ${MINIO_SKEY:-minio-secret-key}
    volumes:
      - photo_storage_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 3s
      retries: 5

  photo-storage-init:
    image: minio/mc
    depends_on:
      photo-storage:
        condition: service_healthy
    environment:
      - MINIO_AKEY=${MINIO_AKEY:-minio-access-key}
      - MINIO_SKEY=${MINIO_SKEY:-minio-secret-key}
    volumes:
      - ./init/minio/photos:/tmp/photos
      - ./init/minio/init.sh:/usr/bin/init.sh
    entrypoint: /bin/sh /usr/bin/init.sh

  # ===== Services =====

  service-s:
    build: services/service-s
    image: job4j_middle_test/service-s:latest
    container_name: service-s
    ports:
      - "9900:9900"
    depends_on:
      postgres:
        condition: service_healthy
      photo-storage:
        condition: service_healthy
      broker:
        condition: service_healthy
    environment:
      SERVER_PORT: 9900
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/students_db
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-postgres}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-password}
      SPRING_KAFKA_BOOTSTRAP_SERVERS: broker:9092
      MINIO_URL: http://photo-storage:9000
      MINIO_ACCESS_KEY: ${MINIO_AKEY:-minio-access-key}
      MINIO_SECRET_KEY: ${MINIO_SKEY:-minio-secret-key}
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:9900/actuator/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 40s

  service-r:
    build: services/cd_desc
    image: checkdev/cd_desc:latest
    container_name: cd_desc
    ports:
      - "9902:9902"
    depends_on:
      service-s:
        condition: service_healthy
    environment:
      SERVER_PORT: 9902
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/cd_desc
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-postgres}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-password}
      SECURITY_OAUTH2_CLIENT_CLIENT_ID: ${OAUTH2_CLIENT_ID:-job4j}
      SECURITY_OAUTH2_CLIENT_CLIENT_SECRET: ${OAUTH2_CLIENT_SECRET:-password}
      SECURITY_OAUTH2_RESOURCE_USERINFOURL: http://auth:9900/user
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:9902/actuator/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 40s

volumes:
  postgres_data:
  photo_storage_data:
  kafka-data: